<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURION NEXUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style.css"> 
</head>
<body class="bg-[#111214] h-screen flex text-gray-300 overflow-hidden select-none">

    <div id="login-overlay" class="fixed inset-0 bg-black/90 backdrop-blur-xl flex items-center justify-center z-[99999]">
        <div class="glass-panel p-10 rounded-2xl border border-[#00ff41]/20 text-center w-80 shadow-2xl z-10">
            <h2 class="text-[#00ff41] font-black text-3xl mb-6 tracking-tighter">AURION NEXUS</h2>
            <input type="text" id="username-input" class="w-full bg-black/40 border border-white/5 p-3 rounded-lg mb-4 text-[#00ff41] outline-none focus:border-[#00ff41]/50 transition-all" placeholder="Initialize System Name...">
            <button id="login-btn" class="w-full bg-[#00ff41] text-black font-black py-3 rounded-lg uppercase text-sm hover:bg-white transition-all duration-300 shadow-lg shadow-[#00ff41]/20">Connect</button>
        </div>
    </div>

    <div class="w-[72px] bg-[#1e1f22] glass-sidebar flex flex-col items-center py-4 shrink-0 gap-3 border-r border-black/40 relative">
        <div class="w-12 h-12 bg-[#00ff41] text-black rounded-2xl flex items-center justify-center font-black shadow-[0_0_20px_rgba(0,255,65,0.3)] z-10">AU</div>
    </div>

    <div class="w-60 bg-[#2b2d31] glass-sidebar flex flex-col shrink-0 border-r border-black/40 relative">
        <div id="server-header" class="h-14 flex items-center px-4 font-black text-white cursor-pointer hover:bg-white/10 justify-between border-b border-black/20 z-10">
            <span class="tracking-tight uppercase text-xs font-bold">Aurion Network</span>
            <span class="text-[10px] opacity-40">▾</span>
        </div>
        <div class="flex-1 p-3 space-y-1 overflow-y-auto z-10" id="channel-list"></div>
        
        <div class="bg-[#232428]/60 p-2 flex items-center justify-between border-t border-black/20 z-10">
            <div class="flex items-center gap-2 group cursor-pointer p-1 rounded hover:bg-white/5">
                <div class="relative">
                    <div class="w-8 h-8 bg-[#00ff41]/10 rounded-full border border-[#00ff41]/40 flex items-center justify-center text-[#00ff41] font-black text-[10px]">AU</div>
                    <div class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-[#23a55a] border-2 border-[#232428] rounded-full"></div>
                </div>
                <div class="flex flex-col overflow-hidden w-24">
                    <span class="text-xs font-black text-white leading-tight truncate" id="display-name">User</span>
                    <span class="text-[8px] text-[#00ff41] uppercase font-black tracking-widest opacity-80" id="display-role">Role</span>
                </div>
            </div>
            <button id="settings-btn" onclick="window.openSettings()" class="p-2 text-gray-400 hover:text-[#00ff41] transition-all hover:rotate-90">⚙️</button>
        </div>
    </div>

    <div class="flex-1 bg-[#313338] flex flex-col relative">
        <div class="h-14 border-b border-black/20 flex items-center px-6 font-black text-white shadow-sm z-10" id="channel-header"># general-chat</div>
        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-6 relative"></div>
        <div class="p-4 bg-[#313338] z-10">
            <div id="user-input-container" class="bg-[#383a40] rounded-xl flex items-center px-4 border border-white/5 focus-within:border-[#00ff41]/30 transition-all">
                <input type="text" id="user-input" class="w-full bg-transparent py-3 text-gray-200 outline-none font-medium" placeholder="Message the Nexus...">
            </div>
        </div>
    </div>

    <div class="w-60 bg-[#2b2d31] glass-sidebar flex flex-col shrink-0 border-l border-black/40 relative">
        <div class="h-14 flex items-center justify-between px-4 font-black text-gray-500 text-[10px] uppercase tracking-[0.2em] border-b border-black/10 z-10">
            <span>Online — <span id="online-count">0</span></span>
            <span id="system-clock" class="text-[#00ff41] opacity-60 tabular-nums">00:00:00</span>
        </div>
        <div class="p-3 space-y-1 overflow-y-auto z-10" id="member-list"></div>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden items-center justify-center z-[100000]">
        <div class="bg-[#1e1f22] p-8 rounded-2xl border border-[#00ff41]/30 w-[420px] shadow-[0_0_50px_rgba(0,255,65,0.1)]">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-[#00ff41] font-black text-xl tracking-widest uppercase">Nexus Settings</h2>
                <span class="text-[9px] text-gray-600 font-mono">STABLE_v1.0.4</span>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] uppercase font-black text-gray-500 tracking-widest">System Alias</label>
                    <input type="text" id="new-display-name" class="w-full bg-black/40 border border-[#00ff41]/20 p-3 rounded-lg mt-1 text-white outline-none focus:border-[#00ff41] transition-all">
                </div>

                <div>
                    <label class="text-[10px] uppercase font-black text-gray-500 tracking-widest">Neural Status</label>
                    <input type="text" id="user-status-input" class="w-full bg-black/40 border border-[#00ff41]/20 p-3 rounded-lg mt-1 text-white outline-none focus:border-[#00ff41] transition-all" placeholder="Idle...">
                </div>

                <div class="bg-black/30 p-3 rounded border border-white/5 font-mono text-[10px] text-gray-500">
                    <div class="flex justify-between"><span>LINK_ENCRYPTION:</span> <span class="text-[#00ff41]">ACTIVE</span></div>
                    <div class="flex justify-between"><span>NODE_STATUS:</span> <span class="text-[#00ff41]">OPTIMAL</span></div>
                </div>
            </div>

            <div class="flex gap-3 mt-8">
                <button onclick="window.closeSettings()" class="flex-1 bg-white/5 hover:bg-white/10 text-white font-bold py-3 rounded-lg transition-all border border-white/10 uppercase text-[10px] tracking-widest">Abort</button>
                <button onclick="window.saveProfile()" class="flex-1 bg-[#00ff41] hover:bg-white text-black font-black py-3 rounded-lg transition-all shadow-lg shadow-[#00ff41]/20 uppercase text-[10px] tracking-widest">Update System</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
