<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURION NEXUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#1e1f22] h-screen flex text-gray-300 overflow-hidden select-none">

    <div id="login-overlay" class="fixed inset-0 bg-black/95 flex items-center justify-center z-[100]">
        <div class="bg-[#2b2d31] p-8 rounded-lg border border-[#00ff41]/30 text-center w-80 shadow-2xl">
            <h2 class="text-[#00ff41] font-bold text-2xl mb-4 text-glow">AURION NEXUS</h2>
            <input type="text" id="username-input" class="w-full bg-black/40 border border-white/10 p-3 rounded mb-4 text-[#00ff41] outline-none" placeholder="Username...">
            <button onclick="login()" class="w-full bg-[#00ff41] text-black font-bold py-2 rounded uppercase text-sm hover:bg-white transition">Connect</button>
        </div>
    </div>

    <div id="server-dropdown" class="absolute top-14 left-20 w-56 bg-[#111214] rounded-md shadow-xl border border-black/40 p-2 hidden z-[120] text-sm">
        <div class="space-y-0.5">
            <div class="flex justify-between items-center p-2 hover:bg-[#505adc] hover:text-white rounded cursor-pointer group">
                <span class="text-[#949cf7] group-hover:text-white font-medium">Invite People</span>
                <span class="opacity-60 group-hover:opacity-100">👤+</span>
            </div>
            <hr class="border-white/5 my-1">
            <div class="flex justify-between items-center p-2 hover:bg-[#505adc] hover:text-white rounded cursor-pointer group">
                <span>Server Settings</span>
                <span class="opacity-60 group-hover:opacity-100">⚙️</span>
            </div>
            <div class="flex justify-between items-center p-2 hover:bg-[#505adc] hover:text-white rounded cursor-pointer group">
                <span>Create Channel</span>
                <span class="opacity-60 group-hover:opacity-100">➕</span>
            </div>
            <div class="flex justify-between items-center p-2 hover:bg-[#505adc] hover:text-white rounded cursor-pointer group">
                <span>Create Category</span>
                <span class="opacity-60 group-hover:opacity-100">📂</span>
            </div>
            <hr class="border-white/5 my-1">
            <div class="flex justify-between items-center p-2 hover:bg-[#f23f42] hover:text-white rounded cursor-pointer group">
                <span class="text-[#f23f42] group-hover:text-white">Security Actions</span>
                <span class="opacity-60 group-hover:opacity-100">🛡️</span>
            </div>
        </div>
    </div>

    <div class="w-[72px] bg-[#1e1f22] flex flex-col items-center py-3 shrink-0 gap-2">
        <div class="w-12 h-12 bg-[#00ff41] text-black rounded-2xl flex items-center justify-center font-bold shadow-[0_0_15px_rgba(0,255,65,0.2)] cursor-pointer">AU</div>
    </div>

    <div class="w-60 bg-[#2b2d31] flex flex-col shrink-0">
        <div id="server-header" onclick="toggleServerMenu()" class="h-12 border-b border-black/20 flex items-center px-4 font-bold text-white cursor-pointer hover:bg-white/5 justify-between relative">
            <span>AURION NETWORK</span>
            <span class="text-[10px] opacity-40">▾</span>
        </div>
        
        <div class="flex-1 p-3 space-y-1 overflow-y-auto scroll-hide" id="channel-list">
            </div>
        
        <div class="bg-[#232428] p-2 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="relative">
                    <div class="w-8 h-8 bg-[#00ff41]/20 rounded-full border border-[#00ff41] flex items-center justify-center text-[#00ff41] font-bold text-[10px]">AU</div>
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-[#23a55a] border-2 border-[#232428] rounded-full"></div>
                </div>
                <div class="flex flex-col">
                    <span class="text-xs font-bold text-white leading-tight" id="display-name">Guest</span>
                    <span class="text-[9px] text-[#00ff41] uppercase font-bold tracking-tighter opacity-70" id="display-role">Everyone</span>
                </div>
            </div>
            <button class="text-gray-400 hover:text-white transition-colors">⚙️</button>
        </div>
    </div>

    <div class="flex-1 bg-[#313338] flex flex-col">
        <div class="h-12 border-b border-black/20 flex items-center px-4 font-bold text-white" id="channel-header"># general-chat</div>
        <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 scroll-hide">
            </div>
        <div class="p-4">
            <input type="text" id="user-input" class="w-full bg-[#383a40] rounded-lg py-3 px-4 text-gray-200 outline-none focus:ring-1 focus:ring-[#00ff41]/20 transition-all" placeholder="Message...">
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>

    <script>
        function toggleServerMenu() {
            const menu = document.getElementById('server-dropdown');
            if (menu) menu.classList.toggle('hidden');
        }
        
        // This ensures the enter key works for the login immediately
        document.getElementById('username-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
